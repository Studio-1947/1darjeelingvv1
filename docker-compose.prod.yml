# Production stack — deliberately isolated from docker-compose.yml (the
# local-dev-only file) with both an explicit project `name` AND distinct
# container/volume names. Both matter: Compose derives a project name from
# the directory by default, so two compose files in the same folder with a
# same-named service (e.g. "postgres") are tracked as the SAME resource
# regardless of container_name — confirmed the hard way while testing this
# file, where `docker compose -f docker-compose.prod.yml up` recreated (and
# briefly deleted) the dev environment's actual postgres container. The
# `name:` below is what actually prevents that; the distinct container/
# volume names are defense-in-depth on top of it.
#
# This VPS already runs a system-level Nginx + Certbot fronting every other
# app on the box (see README's "Production deployment" section) — so unlike
# an earlier draft of this file, nginx here is NOT exposed on 80/443. It's
# bound to 127.0.0.1 only, on a port the system Nginx reverse-proxies to,
# exactly like every other project already deployed here.
name: 1darjeeling-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: 1darjeeling_prod_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    # Lets `depends_on: condition: service_healthy` below actually mean "Postgres is accepting
    # connections", not merely "the container was started".
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 1darjeeling_prod_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Computed here (not hand-duplicated in .env) so Postgres credentials
      # only ever live in one place.
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # Bare `depends_on` only waits for the container to start, not for Postgres/MinIO to be ready —
    # so the backend's schema sync or first bucket bootstrap could fire before either is up.
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: 1darjeeling_prod_minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    # No `ports:` here on purpose. The backend reaches MinIO over the internal compose network
    # (MINIO_ENDPOINT=http://minio:9000 in .env); publishing 9000/9001 to the host would put the
    # object store directly on the internet. The PUBLIC bucket is instead served through the nginx
    # container (see deploy/nginx/app.conf), and the PRIVATE KYC bucket is never exposed at all —
    # it's reachable only via the backend's own authorized proxy route.
    volumes:
      - minio_data_prod:/data
    command: server /data --console-address ":9001"
    # MinIO exposes a liveness probe on its API port; used so `depends_on: condition:
    # service_healthy` above means "MinIO is actually accepting S3 calls", not just "started".
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: 1darjeeling_prod_nginx
    restart: unless-stopped
    ports:
      # Loopback-only — the VPS's system Nginx is what's actually reachable
      # from the internet; it proxy_passes to this port. Change the host
      # port here (left of the colon) if 8091 is ever already taken.
      - "127.0.0.1:8091:80"
    depends_on:
      - backend
      - minio

volumes:
  pg_data_prod:
  minio_data_prod:
