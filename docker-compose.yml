version: '3.8'
name: 1darjeeling

services:
  postgres:
    image: postgres:15-alpine
    container_name: 1darjeeling_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=one_darjeeling
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 1darjeeling_backend
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/one_darjeeling
      - JWT_SECRET=your_jwt_secret_here
      - MOCK_PAYMENTS=true
      - APP_ENV=development
      - CORS_ORIGINS=*
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - MINIO_BUCKET=one-darjeeling
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_KYC_BUCKET=one-darjeeling-kyc
    depends_on:
      - postgres
      - minio

  minio:
    image: minio/minio:latest
    container_name: 1darjeeling_minio
    restart: on-failure
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  pg_data:
  minio_data:
