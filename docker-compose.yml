version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: 1darjeeling_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 1darjeeling_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=one_darjeeling
      - JWT_SECRET=your_jwt_secret_here
      - MOCK_PAYMENTS=true
      - APP_ENV=development
      - CORS_ORIGINS=*
    depends_on:
      - mongodb

volumes:
  mongo_data:
