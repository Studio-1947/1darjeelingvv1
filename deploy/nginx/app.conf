# Final production config, used once a real Let's Encrypt cert exists at
# /etc/letsencrypt/live/onedarjeeling.duckdns.org/. Until then, nginx is
# started with app-bootstrap.conf instead (see deploy/init-letsencrypt.sh).

server {
    listen 80;
    server_name onedarjeeling.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name onedarjeeling.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/onedarjeeling.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onedarjeeling.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10m;

    # Docker's embedded DNS. Combined with a variable in proxy_pass (below),
    # this makes nginx re-resolve "backend" at request time instead of once
    # at startup — so it doesn't fail to boot if the backend container isn't
    # up yet, and doesn't cache a stale IP after backend gets recreated on
    # a redeploy.
    resolver 127.0.0.11 valid=10s;

    # Bare /api (no trailing slash) doesn't match the /api/ prefix location
    # below, so it'd otherwise fall through to the frontend's catch-all and
    # 301 to /api/ before reaching the backend. Nothing in the app ever calls
    # bare /api except the health-check convenience route, but handle it
    # directly rather than relying on that extra redirect hop.
    location = /api {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API — Express already mounts routes under /api/..., so the
    # full request path is forwarded as-is (no rewrite).
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs live at /api-docs (not under /api), mounted separately in app.ts.
    location /api-docs {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin SPA (Vite build), served under /admin — built with base '/admin/'.
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Public tourist/provider SPA (CRA build), served at root.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
