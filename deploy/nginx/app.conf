# This nginx runs INSIDE Docker, bound to 127.0.0.1 only (see
# docker-compose.prod.yml) — it never talks TLS and is never reachable from
# outside the VPS directly. The VPS's existing system Nginx (already fronting
# every other app on this box) terminates HTTPS and reverse-proxies
# onedarjeeling.duckdns.org to this container's port, exactly like it does
# for the other projects sharing this server. See README's "Production
# deployment" section for the host-side Nginx + Certbot setup.

server {
    listen 80;
    server_name onedarjeeling.duckdns.org;

    client_max_body_size 10m;

    # Docker's embedded DNS. Combined with a variable in proxy_pass (below),
    # this makes nginx re-resolve "backend" at request time instead of once
    # at startup — so it doesn't fail to boot if the backend container isn't
    # up yet, and doesn't cache a stale IP after backend gets recreated on
    # a redeploy.
    resolver 127.0.0.11 valid=10s;

    # Bare /api (no trailing slash) doesn't match the /api/ prefix location
    # below, so it'd otherwise fall through to the frontend's catch-all and
    # 301 to /api/ before reaching the backend. Nothing in the app ever calls
    # bare /api except the health-check convenience route, but handle it
    # directly rather than relying on that extra redirect hop.
    location = /api {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API — Express already mounts routes under /api/..., so the
    # full request path is forwarded as-is (no rewrite).
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs live at /api-docs (not under /api), mounted separately in app.ts.
    location /api-docs {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin SPA (Vite build), served under /admin — built with base '/admin/'.
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # --- Object storage: PUBLIC bucket only ---
    #
    # MinIO holds two buckets and they must never be reachable through the same path prefix:
    #   - MINIO_BUCKET (default "one-darjeeling", see backend/src/config.ts) is PUBLIC — listing
    #     images. uploadToMinIO() returns URLs shaped ${MINIO_PUBLIC_URL}/${MINIO_BUCKET}/<key>,
    #     so browsers fetch this path directly. That's what the location below serves.
    #   - MINIO_KYC_BUCKET (default "one-darjeeling-kyc") is PRIVATE — Aadhaar/PAN/licence scans.
    #     It has NO public-read policy and must be reached ONLY through the authenticated backend
    #     route GET /api/providers/kyc/:id/file. Do NOT add an nginx location for it, "for
    #     symmetry" or otherwise — that would leak government ID documents to the internet.
    #
    # The bucket name in this path is coupled to MINIO_BUCKET: if that env var is ever changed,
    # this location (and the deny block below) must be updated to match, or public images 404.
    #
    # Matches only the PUBLIC bucket prefix. nginx prefix matching is exact-segment: a request for
    # /one-darjeeling-kyc/... does NOT fall into /one-darjeeling/ because the next character after
    # the prefix is "-", not "/" — nginx location matching operates on the literal string, so
    # "/one-darjeeling-kyc/x" simply doesn't start with "/one-darjeeling/". Still, the KYC deny
    # below is kept as belt-and-braces in case the bucket names ever change.
    location /one-darjeeling/ {
        # Objects are fetched, never written, through this path — uploads go through the
        # authenticated backend (POST /api/listings/upload), never directly to MinIO. Reject
        # anything but GET/HEAD so this proxy can't be used to write/delete objects in the
        # public bucket even if MinIO's own auth were ever misconfigured.
        limit_except GET HEAD {
            deny all;
        }
        set $minio_upstream http://minio:9000;
        proxy_pass $minio_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Defense-in-depth: explicitly block the private KYC bucket path even though the public
    # location above cannot match it. Placed after the public location but matched first by nginx
    # (longer/more specific prefixes take priority over shorter ones regardless of file order), so
    # this cannot be bypassed by the public rule above. If someone ever renames MINIO_BUCKET to a
    # prefix of MINIO_KYC_BUCKET, or loosens the location above to a broader pattern, this still
    # blocks it.
    location /one-darjeeling-kyc/ {
        return 404;
    }

    # Public tourist/provider SPA (CRA build), served at root.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
